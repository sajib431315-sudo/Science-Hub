<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Science & Technology Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        h2 { color: #1a73e8; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1557b0; }
        #message { color: red; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Science Hub Login</h2>
    <p>Enter the shared password to access Grade 10 resources.</p>
    <input type="password" id="passwordField" placeholder="Enter Password">
    <button onclick="checkPassword()">Enter Hub</button>
    <p id="message"></p>
</div>

<script>
    function checkPassword() {
        const password = document.getElementById("passwordField").value;
        // CHANGE 'science2081' to whatever password you want!
        if (password === "science2081") {
            window.location.href = "hub.html"; 
        } else {
            document.getElementById("message").innerText = "Incorrect Password. Try again.";
        }
    }
</script>

</body>
</html>
