<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>

<script>
  // Your Firebase configuration (from Firebase Console)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "your-project.firebaseapp.com",
    projectId: "your-project-id",
  };
  firebase.initializeApp(firebaseConfig);

  function loginWithGoogle() {
    var provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider).then((result) => {
        // After Google Login, show the Password Field
        document.getElementById('password-section').style.display = 'block';
        document.getElementById('google-btn').style.display = 'none';
        console.log("User logged in:", result.user.email);
    });
  }

  function finalCheck() {
    const sharedPass = document.getElementById('pass').value;
    if (sharedPass === "science2081") {
        window.location.href = "hub.html";
    } else {
        alert("Incorrect shared password!");
    }
  }
</script>

<div id="login-container">
    <button id="google-btn" onclick="loginWithGoogle()">Step 1: Sign in with Gmail</button>
    
    <div id="password-section" style="display:none;">
        <p>Step 2: Enter Shared Access Code</p>
        <input type="password" id="pass">
        <button onclick="finalCheck()">Access Hub</button>
    </div>
</div>
