<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Science & Technology Hub</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            height: 100vh;
            display: flex; 
            justify-content: center; 
            background-color: #0b0e14; 
            background-image: url('https://lh3.googleusercontent.com/d/109GgPR3tYBKuRjCrH5j85fbRRzovInMG'); 
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: top;
            background-attachment: fixed;
        }

        .login-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(8px);
            padding: 1.5rem; 
            width: 280px; 
            border-radius: 12px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 320px; 
            height: max-content;
        }

        h2 { color: #1a73e8; margin: 0 0 5px 0; font-size: 20px; }
        p { color: #444; font-size: 13px; margin-bottom: 15px; }

        .password-container { position: relative; width: 100%; margin: 8px 0; }
        
        input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 14px;
            outline: none;
        }
        
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 16px;
        }

        button { 
            width: 100%; 
            padding: 10px; 
            background: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px;
            font-size: 15px;
        }

        button:hover { background: #1557b0; }
        #message { color: #d93025; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="login-card">
    <h2>Science Hub</h2>
    <p>Secure Access for Grade 10</p>
    
    <div class="password-container">
        <input type="password" id="passwordField" placeholder="Enter Password" onkeypress="handleKeyPress(event)">
        <span class="toggle-password" onclick="toggleVisibility()" id="toggleIcon">👁️</span>
    </div>

    <button onclick="checkPassword()">Enter Hub</button>
    <p id="message"></p>
</div>

<script>
    function handleKeyPress(e) {
        if (e.key === "Enter") {
            checkPassword();
        }
    }

    function toggleVisibility() {
        const passwordField = document.getElementById("passwordField");
        const toggleIcon = document.getElementById("toggleIcon");
        if (passwordField.type === "password") {
            passwordField.type = "text";
            toggleIcon.innerText = "🙈";
        } else {
            passwordField.type = "password";
            toggleIcon.innerText = "👁️";
        }
    }

    function checkPassword() {
        const password = document.getElementById("passwordField").value;
        if (password === "sajib#") {
            // Updated destination to hub.html
            window.location.href = "hub.html"; 
        } else {
            document.getElementById("message").innerText = "Incorrect Password. Try again.";
        }
    }

    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || 
          (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) || 
          (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) { 
            return false; 
        }
    };
</script>

</body>
</html>
