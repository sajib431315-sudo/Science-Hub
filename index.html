<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Science Hub</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        .btn { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.3s; }
        #google-btn { background: #4285F4; color: white; }
        #google-btn:hover { background: #357abd; }
        #pass-section { display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #submit-btn { background: #28a745; color: white; }
        #submit-btn:hover { background: #218838; }
        .error { color: red; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2 style="color: #333;">Science Hub</h2>
    <p style="color: #666;">Step 1: Sign in with your Gmail</p>
    
    <button id="google-btn" class="btn" onclick="loginWithGoogle()">Sign in with Google</button>

    <div id="pass-section">
        <p style="color: #666;">Step 2: Enter Access Code</p>
        <input type="password" id="accessCode" placeholder="Enter Shared Password">
        <button id="submit-btn" class="btn" onclick="checkFinalAccess()">Enter Hub</button>
        <p id="error-msg" class="error"></p>
    </div>
</div>

<script>
    // 2. REPLACE THIS WITH YOUR ACTUAL DATA FROM FIREBASE SETTINGS
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);

    function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        firebase.auth().signInWithPopup(provider)
            .then((result) => {
                // Success! Show password section
                document.getElementById('pass-section').style.display = 'block';
                document.getElementById('google-btn').style.display = 'none';
                console.log("Logged in as:", result.user.email);
            })
            .catch((error) => {
                console.error("Auth Error:", error.message);
                alert("Login failed: " + error.message);
            });
    }

    function checkFinalAccess() {
        const code = document.getElementById('accessCode').value;
        const correctCode = "science2081"; // Set your password here

        if (code === correctCode) {
            window.location.href = "hub.html"; // Make sure your main site is named hub.html
        } else {
            document.getElementById('error-msg').innerText = "Wrong password. Please try again.";
        }
    }
</script>

</body>
</html>
